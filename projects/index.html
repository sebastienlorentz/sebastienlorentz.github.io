---
layout: default
title: Projects
---

<style>
  .projects-header {
    padding-bottom: 1.8rem;
    border-bottom:  1px solid var(--border);
    margin-bottom:  2.5rem;
  }

  .project-list {
    display:       flex;
    flex-direction: column;
    gap:           1px;
    background:    var(--border);
    border:        1px solid var(--border);
    border-radius: 6px;
    overflow:      hidden;
  }

  .project-row {
    display:         grid;
    grid-template-columns: 1fr auto;
    align-items:     start;
    gap:             1rem;
    background:      var(--bg);
    padding:         1.3rem 1.6rem;
    text-decoration: none;
    transition:      background 0.2s;
  }
  .project-row:hover { background: var(--surface); }

  .row-title {
    font-family:   var(--font-serif);
    font-size:     1.08rem;
    color:         var(--text);
    margin-bottom: 0.25rem;
  }
  .row-desc {
    font-size:     0.82rem;
    color:         var(--text-dim);
    line-height:   1.5;
    margin-bottom: 0.5rem;
  }
  .row-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
  .row-tag {
    font-family:    var(--font-mono);
    font-size:      0.57rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border:         1px solid var(--border);
    border-radius:  2px;
    padding:        0.1em 0.45em;
    color:          var(--muted);
  }
  .row-date {
    font-family:    var(--font-mono);
    font-size:      0.65rem;
    color:          var(--text-dim);
    white-space:    nowrap;
    padding-top:    0.15rem;
  }
</style>

<div class="projects-header">
  <h1>Projects</h1>
</div>

<div class="project-list">

  <a class="project-row" href="/projects/voronoi.html">
    <div>
      <div class="row-title">Voronoi Diagrams</div>
      <div class="row-desc">Per-pixel Voronoi colouring with edge detection, built in p5.js.</div>
      <div class="row-tags">
        <span class="row-tag">geometry</span>
        <span class="row-tag">p5.js</span>
        <span class="row-tag">visualisation</span>
      </div>
    </div>
    <div class="row-date">Apr 2026</div>
  </a>

  <!-- Add a new .project-row block here for each new project -->

</div>
