<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juniper Test</title>

  <!-- Step 5: Load Juniper script and stylesheet -->
  <script src="https://unpkg.com/juniper-js"></script>
  <link rel="stylesheet" href="https://unpkg.com/juniper-js/dist/juniper.css" />

</head>
<body>

  <h1>Juniper Test</h1>

  <!-- Step 6: Binder warm-up script -->
  <!-- Silently pings Binder on page load so the container -->
  <!-- starts warming up before the user clicks run -->
  <script>
    fetch('https://mybinder.org/build/gh/gaba5/gaba5.github.io/main')
      .catch(function() {});
  </script>

  <!-- Step 7: Juniper initialisation -->
  <!-- Must come before any code cells -->
  <!-- repo: your GitHub repo in the form username/reponame -->
  <!-- branch: the branch Binder should use -->
  <!-- kernelType: 'python3' for Python, 'octave' for Octave -->
  <!-- defaultLang: sets syntax highlighting default -->
  <script>
    new Juniper({
      repo: 'gaba5/gaba5.github.io',
      branch: 'main',
      kernelType: 'python3',
      defaultLang: 'python'
    });
  </script>

  <!-- Step 8: Code cell template -->
  <!-- .juniper-wrap and .juniper-header are your custom styling -->
  <!-- data-executable="true" tells Juniper this is a runnable cell -->
  <!-- data-language sets the kernel language and syntax highlighting -->
  <!-- Change data-language to "octave" for Octave cells -->
  <div class="juniper-wrap">
    <div class="juniper-header">
      <span class="juniper-header-label">Interactive — edit and run</span>
      <span class="juniper-header-lang">Python</span>
    </div>
    <pre data-executable="true" data-language="python">
        import numpy as np
        import matplotlib.pyplot as plt

        x = np.linspace(0, 2 * np.pi, 500)
        plt.plot(x, np.sin(x))
        plt.xlabel('x')
        plt.ylabel('sin(x)')
        plt.title('Sine wave')
        plt.show()
    </pre>
  </div>

</body>
</html>
