<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        packages: {'[+]': ['ams']}
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:        #0e0e0f;
      --surface:   #141416;
      --border:    #252528;
      --muted:     #3a3a3f;
      --text:      #d8d4cc;
      --text-dim:  #7a7870;
      --accent:    #c8a96e;      /* warm gold */
      --accent2:   #6e9ec8;      /* slate blue */
      --code-bg:   #111113;

      --font-serif: 'EB Garamond', Georgia, serif;
      --font-body:  'Spectral', Georgia, serif;
      --font-mono:  'JetBrains Mono', 'Fira Code', monospace;

      --max-w: 740px;
      --nav-h: 56px;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.75;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ───────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(14, 14, 15, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
    }

    .nav-inner {
      max-width: var(--max-w);
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 2rem;
    }

    .nav-brand {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: opacity 0.2s;
    }
    .nav-brand:hover { opacity: 0.75; }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--text); }

    /* ── Main content ──────────────────────────────────────── */
    main {
      flex: 1;
      max-width: var(--max-w);
      width: 100%;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    /* ── Typography ────────────────────────────────────────── */
    h1, h2, h3, h4 {
      font-family: var(--font-serif);
      font-weight: 400;
      line-height: 1.25;
      color: var(--text);
    }
    h1 { font-size: 2.4rem; margin-bottom: 0.6rem; }
    h2 { font-size: 1.55rem; margin-top: 2.8rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.35rem; }
    h3 { font-size: 1.15rem; margin-top: 2rem; margin-bottom: 0.5rem; color: var(--text-dim); }
    h4 { font-size: 1rem; margin-top: 1.5rem; margin-bottom: 0.4rem; }

    p { margin-bottom: 1.2rem; }

    a { color: var(--accent2); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); }

    strong { font-weight: 500; color: var(--text); }
    em { font-style: italic; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    blockquote {
      border-left: 2px solid var(--accent);
      padding: 0.2rem 1.2rem;
      color: var(--text-dim);
      font-style: italic;
      margin: 1.5rem 0;
    }

    /* ── Lists ─────────────────────────────────────────────── */
    ul, ol { padding-left: 1.4rem; margin-bottom: 1.2rem; }
    li { margin-bottom: 0.3rem; }

    /* ── Code ──────────────────────────────────────────────── */
    code {
      font-family: var(--font-mono);
      font-size: 0.78em;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.1em 0.35em;
      color: var(--accent);
    }

    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.55;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text);
      font-size: 0.8rem;
    }

    /* Rouge syntax highlighting (dark) */
    .highlight .k, .highlight .kd, .highlight .kn { color: #c08080; }  /* keyword */
    .highlight .s, .highlight .s1, .highlight .s2 { color: #87a77a; }  /* string */
    .highlight .c, .highlight .c1, .highlight .cm { color: #555560; font-style: italic; } /* comment */
    .highlight .mi, .highlight .mf { color: #89aac4; }                 /* number */
    .highlight .nf, .highlight .n  { color: var(--text); }             /* name */
    .highlight .p                   { color: var(--text-dim); }         /* punctuation */

    /* ── Page header (used in default pages) ──────────────── */
    .page-header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header .subtitle {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 0.4rem;
    }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
    }
    footer p {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 600px) {
      html { font-size: 16px; }
      main { padding: 2.5rem 1.25rem 4rem; }
      h1   { font-size: 1.9rem; }
      .nav-inner { padding: 0 1.25rem; }
    }
  </style>

  {% if page.extra_css %}
  <style>{{ page.extra_css }}</style>
  {% endif %}
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"        {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/projects/' | relative_url }}" {% if page.url contains '/projects' %}class="active"{% endif %}>Projects</a></li>
        <li><a href="{{ '/about/' | relative_url }}"  {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
      </ul>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>{{ site.title }} &mdash; built with Jekyll &amp; GitHub Pages</p>
  </footer>

</body>
</html>
