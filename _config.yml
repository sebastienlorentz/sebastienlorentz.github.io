title: "Sebastien"
description: "Notes on mathematics, simulation, and code."
author: Sebastien

baseurl: ""
url: "https://yourusername.github.io"

# No gem theme — layouts are in _layouts/
theme: ~

# Plain HTML pages, no markdown processing needed
markdown: kramdown

# Layout defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
